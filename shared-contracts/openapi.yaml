openapi: 3.1.0
info:
  title: StripNoir Public API
  version: 0.1.0
  summary: Public Node.js API contract for MVP and realtime orchestration.
  description: |
    This contract defines externally supported `/api/v1` APIs for clients.
    Internal service-to-service contracts are tracked in `shared-contracts/internal-contracts.md`.
servers:
  - url: http://localhost:13000
    description: Local docker development host mapping
tags:
  - name: Health
  - name: Auth
  - name: User
  - name: Creator
  - name: Stream
  - name: Chat
  - name: Content
  - name: Feed
  - name: Payment
  - name: Wallet
  - name: Payout
  - name: Notification
paths:
  /health:
    get:
      tags: [Health]
      summary: API health
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                required: [service, status, port]
                properties:
                  service:
                    type: string
                    example: api
                  status:
                    type: string
                    example: ok
                  port:
                    type: integer
                    example: 3000

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh/access tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New session tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logout status
          content:
            application/json:
              schema:
                type: object
                properties:
                  loggedOut:
                    type: boolean

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/{id}:
    get:
      tags: [User]
      summary: Get user profile with follow stats
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User profile payload
        '404':
          description: User not found

  /api/v1/users/{id}/follow:
    post:
      tags: [User]
      summary: Follow a user/creator
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '201':
          description: Followed

  /api/v1/users/{id}/unfollow:
    delete:
      tags: [User]
      summary: Unfollow a user/creator
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Unfollowed status

  /api/v1/creators/apply:
    post:
      tags: [Creator]
      summary: Apply/enable creator profile for current user
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Creator profile created or updated

  /api/v1/creators/{id}:
    get:
      tags: [Creator]
      summary: Get creator profile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CreatorId'
      responses:
        '200':
          description: Creator profile
        '404':
          description: Creator not found

  /api/v1/creators/subscription:
    post:
      tags: [Creator]
      summary: Subscribe current user to creator (no payment)
      description: |
        **Disabled by default** in production-like configs: returns **403** unless `ALLOW_FREE_SUBSCRIPTION=1`.
        For paid subscriptions use **`POST /api/v1/payments/subscribe`** (credits transfer + subscription row).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [creatorId]
              properties:
                creatorId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Subscription active

  /api/v1/creators/verification/submit:
    post:
      tags: [Creator]
      summary: Submit creator verification documents
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaAssetIds]
              properties:
                mediaAssetIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                metadata:
                  type: object
      responses:
        '201':
          description: Verification submission created
        '403':
          description: Creator profile required

  /api/v1/creators/verification/status:
    get:
      tags: [Creator]
      summary: Get current creator verification status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification status payload

  /api/v1/admin/creator-verifications:
    get:
      tags: [Creator]
      summary: List creator verification submissions (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Verification submissions list

  /api/v1/admin/creator-verifications/{submissionId}/approve:
    post:
      tags: [Creator]
      summary: Approve creator verification submission (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Approved

  /api/v1/admin/creator-verifications/{submissionId}/reject:
    post:
      tags: [Creator]
      summary: Reject creator verification submission (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Rejected

  /api/v1/content:
    post:
      tags: [Content]
      summary: Create a content post
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Content created

  /api/v1/content/{id}:
    get:
      tags: [Content]
      summary: Get content details
      description: |
        Access rules include `public`, `followers`, `subscribers`, `private` (subscriber-only),
        and `exclusive_ppv` (subscription and/or PPV unlock via `POST .../unlock` when `requiresPayment`).
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: Content payload
    patch:
      tags: [Content]
      summary: Update owned content post
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ContentId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string, nullable: true }
                caption: { type: string, nullable: true }
                visibility:
                  type: string
                  enum: [public, followers, subscribers, exclusive_ppv, private]
                status:
                  type: string
                  enum: [draft, published, archived, deleted]
                requiresPayment: { type: boolean }
                unlockPriceCredits: { type: integer, minimum: 0 }
                metadata: { type: object }
      responses:
        '200':
          description: Updated content
    delete:
      tags: [Content]
      summary: Delete owned content
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: Delete status

  /api/v1/content/{id}/unlock:
    post:
      tags: [Content]
      summary: Pay credits to unlock PPV content (exclusive_ppv + requiresPayment)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ContentId'
      responses:
        '201':
          description: Unlocked; ledger transfer returned
        '200':
          description: Already had access
        '402':
          description: Insufficient credits

  /api/v1/feed:
    get:
      tags: [Feed]
      summary: Get following feed
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feed entries

  /api/v1/feed/trending:
    get:
      tags: [Feed]
      summary: Get trending feed
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feed entries

  /api/v1/feed/creators:
    get:
      tags: [Feed]
      summary: Home / discovery list of content creators
      description: |
        Paginated list of creators (excluding the current user) with **subscription list price** (`stats.subscriptionPriceCredits`,
        same source as `creator.defaultSubscriptionPriceCredits`) and **active subscriber count** (`stats.activeSubscribers`).
        Includes whether the viewer already follows or is subscribed. Order: most subscribers first, then recently updated.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: search
          in: query
          description: Case-insensitive substring match against `username`, `display_name`, `stage_name`, and `about`.
          schema:
            type: string
        - name: category
          in: query
          description: Case-insensitive match against `creator_profile.category_tags`.
          schema:
            type: string
        - name: verification_status
          in: query
          description: Filter by `creator_profile.verification_status`.
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        '200':
          description: Creator cards for home or browse UI
          content:
            application/json:
              schema:
                type: object
                required: [creators]
                properties:
                  creators:
                    type: array
                    items:
                      type: object
                      required: [creator, stats, viewer]
                      properties:
                        creator:
                          type: object
                          description: Creator profile plus public user display fields
                        stats:
                          type: object
                          required: [activeSubscribers, subscriptionPriceCredits]
                          properties:
                            activeSubscribers:
                              type: integer
                              description: Count of users with an active subscription to this creator
                            subscriptionPriceCredits:
                              type: integer
                              description: Default subscription price in credits (period charged via payments/subscribe)
                        viewer:
                          type: object
                          properties:
                            isFollowing:
                              type: boolean
                            isSubscribed:
                              type: boolean

  /api/v1/payments/deposit:
    post:
      tags: [Payment]
      summary: Deposit credits to current wallet
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Deposit ledger entry

  /api/v1/payments/subscribe:
    post:
      tags: [Payment]
      summary: Charge subscription payment transfer
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Transfer + subscription payload

  /api/v1/payments/tip:
    post:
      tags: [Payment]
      summary: Tip creator from user wallet
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Transfer completed

  /api/v1/payments/history:
    get:
      tags: [Payment]
      summary: List wallet ledger history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Ledger list

  /api/v1/wallet/balance:
    get:
      tags: [Wallet]
      summary: Get current wallet balances
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wallet balance

  /api/v1/payouts/request:
    post:
      tags: [Payout]
      summary: Create payout request
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Payout request created

  /api/v1/payouts/history:
    get:
      tags: [Payout]
      summary: List creator payout requests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payout history

  /api/v1/notifications:
    get:
      tags: [Notification]
      summary: List notifications
      description: |
        Polling fallback for the notification inbox. Primary delivery: `GET /api/v1/notifications/ws-token`
        then connect to the Go service via WebSocket or `GET /realtime/notify/events` long-poll.
        Successful responses may include `X-StripNoir-Realtime: prefer-go-websocket-or-long-poll`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification list

  /api/v1/notifications/read:
    post:
      tags: [Notification]
      summary: Mark notifications as read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Marked read count

  /api/v1/notifications/ws-token:
    get:
      tags: [Notification]
      summary: Issue notification stream token for Go websocket / long-poll
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Websocket and long-poll URLs for user-scoped notification events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotifyTokenResponse'

  /api/v1/streams/start:
    post:
      tags: [Stream]
      summary: Start a live session for the current creator
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartLiveSessionRequest'
      responses:
        '201':
          description: Live session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveSessionMutationResponse'

  /api/v1/streams/live:
    get:
      tags: [Stream]
      summary: List active live sessions
      description: |
        Periodic REST refresh is a fallback for discovery. For an active session, prefer Go chat/WebSocket
        (`GET /api/v1/chat/ws-token` for the stream room) and `live.ws_presence` for viewer pressure;
        use this list for catalog/navigation only, not high-frequency polling.
      responses:
        '200':
          description: Active live session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveSessionListResponse'

  /api/v1/streams/{id}:
    get:
      tags: [Stream]
      summary: Get live session details
      description: |
        Snapshot of session state (viewer counts, etc.). Prefer realtime events on the stream chat room
        for live updates instead of tight polling loops. May include `X-StripNoir-Realtime: prefer-go-websocket-or-long-poll`.
      parameters:
        - $ref: '#/components/parameters/LiveSessionId'
      responses:
        '200':
          description: Live session details
          content:
            application/json:
              schema:
                type: object
                properties:
                  stream:
                    $ref: '#/components/schemas/LiveSession'
        '404':
          description: Live session not found

  /api/v1/streams/{id}/join:
    post:
      tags: [Stream]
      summary: Join an active live session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LiveSessionId'
      responses:
        '200':
          description: Joined live session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveSessionMutationResponse'
        '402':
          description: Insufficient credits to join

  /api/v1/streams/{id}/token:
    post:
      tags: [Stream]
      summary: Issue a LiveKit token for an active live session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LiveSessionId'
      responses:
        '200':
          description: LiveKit token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveSessionMutationResponse'
        '403':
          description: Active live-session access required
        '503':
          description: LiveKit not configured

  /api/v1/streams/{id}/end:
    post:
      tags: [Stream]
      summary: End an active live session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LiveSessionId'
      responses:
        '200':
          description: Live session ended
          content:
            application/json:
              schema:
                type: object
                properties:
                  stream:
                    $ref: '#/components/schemas/LiveSession'

  /api/v1/chat/ws-token:
    get:
      tags: [Chat]
      summary: Issue chat token for Go websocket service
      security:
        - bearerAuth: []
      parameters:
        - name: roomId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Websocket token + urls
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTokenResponse'
        '403':
          description: Not a participant

  /api/v1/chat/rooms:
    get:
      tags: [Chat]
      summary: List current user rooms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Room list
    post:
      tags: [Chat]
      summary: Create direct room
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Room created

  /api/v1/users/{id}/block:
    post:
      tags: [Chat]
      summary: Block another user (prevents direct-chat messages)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '201':
          description: Block created
    delete:
      tags: [Chat]
      summary: Unblock a previously blocked user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Unblocked status

  /api/v1/chat/rooms/{roomId}/messages/{messageId}/report:
    post:
      tags: [Chat]
      summary: Report a direct message for moderation
      security:
        - bearerAuth: []
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reasonCode]
              properties:
                reasonCode:
                  type: string
                  minLength: 1
                reasonText:
                  type: string
                  nullable: true
                priority:
                  type: integer
                  minimum: 1
                  maximum: 5
                  default: 3
      responses:
        '201':
          description: Moderation report created

  /api/v1/admin/moderation/reports:
    get:
      tags: [Admin, Moderation]
      summary: List moderation reports
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_review, resolved, dismissed]
          required: false
        - name: targetType
          in: query
          schema:
            type: string
            enum: [user, content, message, live_session, video_call_session]
          required: false
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Reports list

  /api/v1/admin/moderation/reports/{reportId}/action:
    post:
      tags: [Admin, Moderation]
      summary: Apply moderation action to a report
      security:
        - bearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actionType]
              properties:
                actionType:
                  type: string
                  enum: [hide_content, remove_content]
                reason:
                  type: string
                  nullable: true
                expiresInSeconds:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Action applied and report resolved

  /api/v1/admin/moderation/reports/{reportId}/dismiss:
    post:
      tags: [Admin, Moderation]
      summary: Dismiss a moderation report
      security:
        - bearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report dismissed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CreatorId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LiveSessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
  schemas:
    User:
      type: object
      required: [id, email, displayName, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
          nullable: true
        displayName:
          type: string
        status:
          type: string
          enum: [active, suspended, banned, deleted]
        createdAt:
          type: string
          format: date-time
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
        username:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [token, refreshToken, sessionId, user]
      properties:
        token:
          type: string
        refreshToken:
          type: string
        sessionId:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'
    RefreshResponse:
      type: object
      required: [token, refreshToken, sessionId]
      properties:
        token:
          type: string
        refreshToken:
          type: string
        sessionId:
          type: string
          format: uuid
    ChatTokenResponse:
      type: object
      required: [token, roomId, wsUrl, longPollUrl]
      properties:
        token:
          type: string
        roomId:
          type: string
          format: uuid
        wsUrl:
          type: string
        longPollUrl:
          type: string
    NotifyTokenResponse:
      type: object
      required: [token, wsUrl, longPollUrl]
      properties:
        token:
          type: string
        wsUrl:
          type: string
        longPollUrl:
          type: string
    StartLiveSessionRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        streamThumbnailUrl:
          type: string
        scheduledStartAt:
          type: string
          format: date-time
        baseJoinPriceCredits:
          type: integer
          minimum: 0
        extendPriceCredits:
          type: integer
