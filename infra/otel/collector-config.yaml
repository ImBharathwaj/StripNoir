# Minimal OpenTelemetry Collector for local/stage wiring (Phase 5 observability scaffold).
# Run: docker compose --profile observability up -d otel-collector
# Point apps at OTLP: http://localhost:14318 (HTTP) or grpc localhost:14317

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  debug:
    verbosity: basic
  # Uncomment for Prometheus remote_write / Jaeger / cloud:
  # otlphttp:
  #   endpoint: https://your-backend.example/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
