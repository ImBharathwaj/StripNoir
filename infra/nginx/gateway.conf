# StripNoir edge gateway (single HTTP entry for local/stage).
# Routes: Node API + Go chat WebSocket/long-poll. Blocks public access to /internal/*.
#
# Canary (split traffic between two API upstreams): uncomment split_clients + second upstream
# and duplicate Deployment with a different image tag — see infra/k8s/README.md.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=per_ip:10m;
resolver 127.0.0.11 valid=10s ipv6=off;

upstream stripnoir_api {
    server api:3000 resolve;
    keepalive 64;
}

# Canary stub: point server api_canary:3000 at a second service when running blue/green.
# upstream stripnoir_api_canary {
#     server api-canary:3000;
#     keepalive 32;
# }

upstream stripnoir_chat {
    server chat:8080 resolve;
    keepalive 32;
}

upstream stripnoir_frontend {
    server frontend:3000 resolve;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 32m;
    limit_conn per_ip 100;

    # Baseline hardening (Phase 7); align CSP / Permissions-Policy with your frontend.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Node API (REST + health + metrics)
    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://stripnoir_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

    location = /health {
        limit_req zone=api_limit burst=200 nodelay;
        proxy_pass http://stripnoir_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /health/deps {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://stripnoir_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /metrics {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://stripnoir_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /metrics.json {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://stripnoir_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Go chat: WebSocket + long-poll (do not rate-limit as aggressively as REST)
    location /ws {
        proxy_pass http://stripnoir_chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /realtime/ {
        proxy_pass http://stripnoir_chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Chat health (optional diagnostics behind gateway)
    location = /chat/health {
        proxy_pass http://stripnoir_chat/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /chat/metrics {
        proxy_pass http://stripnoir_chat/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Internal publish endpoints must not be reachable through the public listener
    location /internal/ {
        return 403;
    }

    location / {
        proxy_pass http://stripnoir_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }
}
