apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stripnoir-chat
  namespace: stripnoir
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stripnoir-chat
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
